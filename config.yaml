# Training Configuration

environment:
  game: "PongNoFrameskip-v4"
  frame_skip: 4
  frame_stack: 4
  screen_size: 84
  grayscale: true
  clip_rewards: true
  max_episode_steps: 10000

agent:
  type: "dqn"
  learning_rate: 0.00025
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay: 1000000
  batch_size: 32
  replay_buffer_size: 100000
  target_update_freq: 10000

training:
  total_timesteps: 10000000
  learning_starts: 50000
  train_freq: 4
  gradient_steps: 1
  save_freq: 100000
  eval_freq: 50000
  eval_episodes: 10

logging:
  log_interval: 1000
  tensorboard: true
  save_video: true
  video_freq: 50000
  log_dir: "results/logs"
  model_dir: "results/models"
  video_dir: "results/videos"

device: "auto"  # auto, cpu, cuda, mps
seed: 42
